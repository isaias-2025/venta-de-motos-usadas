name: Sincronizar ramas 
on: 
  push: 
    branches: Desarrollador 
jobs: 
  crear-pull-request: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v3 
      - uses: peter-evans/create-pull-request@v5 
        with: 
          base: main 
          branch: Desarrollador
          title: "Actualización desde desarrollo" 
          body: "Sincronización automática desde rama desarrollo"
